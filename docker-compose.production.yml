services:
  traefik:
    image: traefik:${TRAEFIK_VERSION:?required}
    container_name: traefik
    restart: unless-stopped
    depends_on:
      crowdsec:
        condition: service_healthy
    command:
      # Dashboard
      - --api.dashboard=true
      - --api.insecure=false

      # Logging
      - --log.level=INFO

      # Access Log (stdout — rotated via Docker logging driver)
      - --accesslog=true
      - --accesslog.format=json

      # Ping
      - --ping=true
      - --ping.entrypoint=ping

      # Providers
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=traefik-network
      - --providers.file.directory=/etc/traefik/conf

      # Experimental Plugins
      - --experimental.plugins.crowdsec-bouncer.moduleName=github.com/maxlerebourg/crowdsec-bouncer-traefik-plugin
      - --experimental.plugins.crowdsec-bouncer.version=${CROWDSEC_BOUNCER_PLUGIN_VERSION:?required}

      # EntryPoints
      - --entrypoints.ping.address=:8082
      - --entrypoints.metrics.address=:8083
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.websecure.transport.respondingTimeouts.idleTimeout=3600s
      - --entrypoints.websecure.http.middlewares=crowdsec@file
      ## HTTP -> HTTPS Automatic Redirection
      - --entrypoints.web.http.redirections.entryPoint.to=websecure
      - --entrypoints.web.http.redirections.entryPoint.scheme=https
      ## Preserves X-Forwarded-For headers. Required when running behind Cloudflare and Docker NAT.
      - --entryPoints.web.forwardedHeaders.trustedIPs=${TRUSTED_PROXIES}
      - --entryPoints.websecure.forwardedHeaders.trustedIPs=${TRUSTED_PROXIES}

      ####################################################################################################
      # HTTP Challenge (Alternative)
      - --certificatesresolvers.le-http.acme.email=${LETSENCRYPT_EMAIL:?required}
      - --certificatesresolvers.le-http.acme.storage=/etc/traefik/acme/le-http.json
      - --certificatesresolvers.le-http.acme.httpchallenge=true
      - --certificatesresolvers.le-http.acme.httpchallenge.entrypoint=web
      #- --certificatesresolvers.le-http.acme.caserver=https://acme-staging-v02.api.letsencrypt.org/directory # Staging Let's Encrypt (Only Test) Server
      ####################################################################################################
      # DNS Challenge (Cloudflare)
      - --certificatesresolvers.le-cloudflare.acme.email=${LETSENCRYPT_EMAIL:?required}
      - --certificatesresolvers.le-cloudflare.acme.storage=/etc/traefik/acme/le-cloudflare.json
      - --certificatesresolvers.le-cloudflare.acme.dnschallenge=true
      - --certificatesresolvers.le-cloudflare.acme.dnschallenge.provider=cloudflare
      - --certificatesresolvers.le-cloudflare.acme.dnschallenge.delaybeforecheck=0
      #- --certificatesresolvers.le-cloudflare.acme.caserver=https://acme-staging-v02.api.letsencrypt.org/directory # Staging Let's Encrypt (Only Test) Server
      ####################################################################################################

      # Metrics
      - --metrics.prometheus=true
      - --metrics.prometheus.entrypoint=metrics
    environment:
      CF_DNS_API_TOKEN: ${CLOUDFLARE_DNS_API_TOKEN}
      CROWDSEC_TRAEFIK_BOUNCER_API_KEY: ${CROWDSEC_TRAEFIK_BOUNCER_API_KEY}
      CROWDSEC_ON_ERROR: ${CROWDSEC_ON_ERROR:-ban}
    security_opt:
      - no-new-privileges:true
    ports:
      - 80:80
      - 443:443
    volumes:
      - ./.docker/traefik/acme:/etc/traefik/acme # ACME certificate storage
      - ./.docker/traefik/conf:/etc/traefik/conf:ro
      - /etc/localtime:/etc/localtime:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro # Required for Docker provider
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "5"
    networks:
      - traefik-network
    labels:
      - traefik.enable=true

      # TLS Domains for Wildcard Certificates
      - traefik.http.routers.traefik.tls.domains[0].main=${WILDCARD_DOMAIN:?required}
      - traefik.http.routers.traefik.tls.domains[0].sans=*.${WILDCARD_DOMAIN:?required}

      # Traefik Dashboard Router
      - traefik.http.routers.traefik.rule=Host(`${TRAEFIK_DASHBOARD_HOST:-traefik.localhost}`)
      - traefik.http.routers.traefik.entrypoints=websecure
      - traefik.http.routers.traefik.tls.certresolver=le-http
      - traefik.http.routers.traefik.service=api@internal
      - traefik.http.routers.traefik.middlewares=trusted@file # Security Middleware (Cloudflare proxy ON)
      #- traefik.http.routers.traefik.middlewares=trusted-direct@file # Security Middleware (Cloudflare proxy OFF)


    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:8082/ping" ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  crowdsec:
    image: crowdsecurity/crowdsec:${CROWDSEC_VERSION:?required}
    container_name: crowdsec
    restart: unless-stopped
    environment:
      COLLECTIONS: crowdsecurity/http-cve crowdsecurity/traefik
      GID: ${CROWDSEC_GID:?required}
      DISABLE_HUB_UPGRADE: ${CROWDSEC_HUB_UPGRADE_DISABLE}
    volumes:
      - ./.docker/crowdsec/data:/var/lib/crowdsec/data
      - ./.docker/crowdsec/config:/etc/crowdsec
      - ./.docker/crowdsec/acquis.yaml:/etc/crowdsec/acquis.yaml:ro
      - ./.docker/crowdsec/whitelists:/etc/crowdsec/parsers/s02-enrich/whitelists:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro # Required to read Traefik container logs
    networks:
      - traefik-network
    healthcheck:
      test: [ "CMD", "cscli", "lapi", "status" ]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  crowdsec-manager:
    image: hhftechnology/crowdsec-manager:${CROWDSEC_MANAGER_VERSION:?required}
    container_name: crowdsec-manager
    restart: unless-stopped
    depends_on:
      crowdsec:
        condition: service_healthy
    environment:
      CROWDSEC_LAPI_URL: http://crowdsec:8080
      CROWDSEC_LAPI_KEY: ${CROWDSEC_MANAGER_API_KEY}
      TZ: ${CROWDSEC_MANAGER_TZ:-Europe/Istanbul}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - traefik-network
    healthcheck:
      test: [ "CMD-SHELL", "nc -z 127.0.0.1 8080 || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - traefik.enable=true

      # Routers
      - traefik.http.routers.crowdsec-manager.rule=Host(`${CROWDSEC_DASHBOARD_HOST:-crowdsec.localhost}`)
      - traefik.http.routers.crowdsec-manager.entrypoints=websecure
      - traefik.http.routers.crowdsec-manager.tls.certresolver=le-http
      - traefik.http.routers.crowdsec-manager.service=crowdsec-manager
      - traefik.http.routers.crowdsec-manager.middlewares=trusted@file # Security Middleware (Cloudflare proxy ON)
      #- traefik.http.routers.crowdsec-manager.middlewares=trusted-direct@file # Security Middleware (Cloudflare proxy OFF)

      # Services
      - traefik.http.services.crowdsec-manager.loadbalancer.server.port=8080


networks:
  traefik-network:
    external: true
