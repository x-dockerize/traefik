services:
  traefik:
    image: traefik:${TRAEFIK_VERSION:?required}
    container_name: traefik
    restart: unless-stopped
    command:
      # Dashboard
      - --api.dashboard=true

      # Logging
      - --log.level=INFO

      # Providers
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.endpoint=unix:///var/run/docker.sock
      - --providers.file.filename=/etc/traefik/tls.yml

      # EntryPoints
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      # HTTP -> HTTPS Auto Forwards
      - --entrypoints.web.http.redirections.entryPoint.to=websecure
      - --entrypoints.web.http.redirections.entryPoint.scheme=https

      # Forwarded Headers Settings (Only Localhost for Development)
      - --entryPoints.web.forwardedHeaders.insecure=true
      - --entryPoints.websecure.forwardedHeaders.insecure=true
    ports:
      - 80:80
      - 443:443
    volumes:
      - ./.docker/traefik/tls.yml:/etc/traefik/tls.yml:ro
      - ./.docker/traefik/certs:/etc/traefik/certs:ro
      - /etc/localtime:/etc/localtime:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - traefik-network
    labels:
      - traefik.enable=true

      # Dashboard Router
      - traefik.http.routers.traefik.rule=Host(`traefik.localhost`)
      - traefik.http.routers.traefik.entrypoints=websecure
      - traefik.http.routers.traefik.service=api@internal
      - traefik.http.routers.traefik.tls=true
    security_opt:
      - no-new-privileges:true


networks:
  traefik-network:
    external: true
